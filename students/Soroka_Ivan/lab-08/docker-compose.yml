version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672" # Панель управления RabbitMQ

  api_gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - ticket_service
      - agent_service

  ticket_service:
    build: ./services/ticket_service
    ports:
      - "8000:8000"

  agent_service:
    build: ./services/agent_service
    ports:
      - "8001:8000"

  notification_service:
    build: ./services/notification_service
    depends_on:
      - rabbitmq